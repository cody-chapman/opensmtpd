# Rsyslog configuration for OpenSMTPD
# This file ensures OpenSMTPD logs are properly handled

# Set the facility for smtpd to use
# This is handled in the smtpd.conf with the -l flag or by system logging

# Log smtpd messages to specific file
:programname, isequal, "smtpd" /var/log/openmtpd/smtpd.log
:programname, isequal, "smtpd" ~

# Log all mail facility messages
mail.* /var/log/openmtpd/mail.log
mail.* ~

# Create directory if it doesn't exist
$ActionFileDefaultTemplate RSYSLOG_FileFormat
