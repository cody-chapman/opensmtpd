# Listen only on internal interfaces (adjust if needed)
listen on 0.0.0.0

# Define internal networks
table allowed_hosts file:/etc/mail_allowed_hosts

# Outbound relay to Microsoft 365
action "relay_out" relay host smtp://mail-relay.mail.protection.outlook.com

# ONLY allow listed hosts to relay
match from src <allowed_hosts> for any action "relay_out"

# Reject everything else explicitly
match from any reject
