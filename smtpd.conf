# Basic OpenSMTPD configuration
# Enable logging to syslog
# Note: This configuration assumes rsyslog is properly configured to handle smtpd messages

# Pki configuration (optional - remove if not using TLS)
# pki "smtpd-cert.pem" {
#     certificate /etc/ssl/certs/ssl-cert.pem
#     key /etc/ssl/private/ssl-cert.key
# }

# Listen on all interfaces
listen on all port 25
listen on all port 587 tls
listen on all port 465 tls

# Basic mail handling
action "local" mbox
action "relay" relay

# Enable logging to syslog
# This will send logs to syslog which rsyslog will capture
