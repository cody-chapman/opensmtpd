# Global directives
$ModLoad imuxsock
$ModLoad imjournal
$WorkDirectory /var/lib/rsyslog
$ActionFileDefaultTemplate RSYSLOG_FileFormat
$IncludeConfig /etc/rsyslog.d/*.conf
$OmitLocalLogging off

# Set proper permissions for log files
$FileOwner root
$FileGroup root
$FileCreateMode 0644

# SMTPD specific logging configuration
# Ensure smtpd messages are properly logged
:programname, isequal, "smtpd" /var/log/openmtpd/mail.log
:programname, isequal, "smtpd" ~

# Mail facility logging
mail.* /var/log/openmtpd/mail.log
mail.* ~

# Log to console (for docker logs)
*.info;mail.none;authpriv.none;cron.none /dev/console
