# Global directives
$ModLoad imuxsock
$ModLoad imjournal
$WorkDirectory /var/lib/rsyslog
$ActionFileDefaultTemplate RSYSLOG_FileFormat
$IncludeConfig /etc/rsyslog.d/*.conf
$OmitLocalLogging off
$LocalHostByName on

# Define log file locations
$ActionQueueType LinkedList
$ActionQueueSaveOnShutdown on
$ActionQueueFileName qf-smtpd
$ActionQueueMaxFileSize 100m
$ActionQueueMaxDiskSpace 1g
$ActionQueueRetentionQueueSize 20000

# SMTPD specific logging
# Log all mail related messages to a dedicated file
:programname, isequal, "smtpd" /var/log/openmtpd/mail.log
:programname, isequal, "smtpd" ~

# Log to console (for docker logs)
*.info;mail.none;authpriv.none;cron.none /dev/console

# Default logging
*.emerg :omusrmsg:*
daemon.*;mail.*;authpriv.*;cron.* ~
