# Global directives
$ModLoad imuxsock
$ModLoad imjournal
$WorkDirectory /var/lib/rsyslog
$IncludeConfig /etc/rsyslog.d/*.conf
$OmitLocalLogging off

# Set proper permissions for log files
$FileOwner root
$FileGroup root
$FileCreateMode 0644

# JSON output template
template(name="JSONFormat" type="list") {
    constant(value="{")
    constant(value="\"timestamp\":\"")      property(name="timereported" dateFormat="rfc3339")
    constant(value="\",\"host\":\"")        property(name="hostname")
    constant(value="\",\"program\":\"")     property(name="programname")
    constant(value="\",\"pid\":\"")         property(name="procid")
    constant(value="\",\"severity\":\"")    property(name="syslogseverity-text")
    constant(value="\",\"facility\":\"")    property(name="syslogfacility-text")
    constant(value="\",\"message\":\"")     property(name="msg" format="json")
    constant(value="\"}\n")
}

# SMTPD specific logging configuration
:programname, isequal, "smtpd" action(type="omfile" file="/var/log/opensmtpd/mail.log" template="JSONFormat")
:programname, isequal, "smtpd" stop

# Mail facility logging
mail.*  action(type="omfile" file="/var/log/opensmtpd/mail.log" template="JSONFormat")
mail.*  stop

# Log to console (for docker logs)
*.info;mail.none;authpriv.none;cron.none action(type="omfile" file="/dev/console" template="JSONFormat")
