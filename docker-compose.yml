services:
  opensmtpd:
    image: ghcr.io/cody-chapman/opensmtpd:latest
    container_name: opensmtpd
    restart: always
    ports:
      - 25:25
      - 465:465
      - 587:587
      - 8080:8080
      - 8888:8888
    environment:
      - TZ=America/Chicago
    volumes:
      - ./smtpd.conf:/etc/smtpd.conf:ro
      - ./supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./allowed_hosts:/etc/mail_allowed_hosts:ro
      - ./logs:/var/log/opensmtpd
      - ./smtpd-manage:/app/smtpd-manage
      - ./tailog.ps1:/app/tailog.ps1
      - ./smtpd-ui.ps1:/app/smtpd-ui.ps1

